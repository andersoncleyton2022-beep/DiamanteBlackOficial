<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DiamanteBlack">
    <meta name="theme-color" content="#0a001f">
    <title>DiamanteBlack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a001f 0%, #1a0033 100%);
            color: #ECEDEE;
            display: flex;
            flex-direction: column;
            padding-top: max(0px, env(safe-area-inset-top));
            padding-bottom: max(0px, env(safe-area-inset-bottom));
            padding-left: max(0px, env(safe-area-inset-left));
            padding-right: max(0px, env(safe-area-inset-right));
        }

        .header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(10, 0, 31, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 28px;
        }

        .header-title {
            flex: 1;
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 700;
            color: #00f0ff;
            margin: 0;
        }

        .header-title p {
            font-size: 12px;
            color: #9BA1A6;
            margin: 2px 0 0 0;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 15px;
        }

        .message.bot .message-bubble {
            background: rgba(0, 240, 255, 0.12);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #ECEDEE;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #00f0ff 0%, #0099cc 100%);
            color: #000;
            font-weight: 500;
        }

        .input-container {
            padding: 12px 20px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(10, 0, 31, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            display: flex;
            gap: 8px;
            background: rgba(30, 32, 34, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 12px;
            padding: 8px 12px;
            align-items: center;
        }

        input {
            flex: 1;
            background: none;
            border: none;
            color: #ECEDEE;
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }

        input::placeholder {
            color: #687076;
        }

        .send-btn {
            background: linear-gradient(135deg, #00f0ff 0%, #0099cc 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .welcome-message {
            text-align: center;
            padding: 20px;
            color: #9BA1A6;
            font-size: 14px;
            line-height: 1.6;
        }

        .welcome-message .title {
            font-size: 24px;
            color: #00f0ff;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .agents-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .agent-item {
            background: rgba(0, 240, 255, 0.08);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: #ECEDEE;
        }

        .agent-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .agent-name {
            color: #00f0ff;
            font-weight: 600;
            font-size: 11px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 240, 255, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 240, 255, 0.5);
        }

        @media (max-width: 480px) {
            .header {
                padding: 12px 16px;
            }

            .header-title h1 {
                font-size: 18px;
            }

            .chat-container {
                padding: 12px 16px;
            }

            .message-bubble {
                font-size: 14px;
                padding: 10px 14px;
            }

            .input-container {
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">💎</div>
        <div class="header-title">
            <h1>DiamanteBlack</h1>
            <p>IA Multi-Agente Offline</p>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message bot">
            <div class="message-bubble">
                <div class="welcome-message">
                    <div class="title">Bem-vindo ao DiamanteBlack! 💎</div>
                    <p>Seu assistente de IA multi-agente ultra-leve para Android.</p>
                    
                    <div class="agents-list">
                        <div class="agent-item">
                            <div class="agent-icon">🧠</div>
                            <div class="agent-name">Qwen2</div>
                            <div style="font-size: 10px; color: #9BA1A6;">Lógica</div>
                        </div>
                        <div class="agent-item">
                            <div class="agent-icon">💻</div>
                            <div class="agent-name">TinyLlama</div>
                            <div style="font-size: 10px; color: #9BA1A6;">Código</div>
                        </div>
                        <div class="agent-item">
                            <div class="agent-icon">✨</div>
                            <div class="agent-name">SmolLM</div>
                            <div style="font-size: 10px; color: #9BA1A6;">Síntese</div>
                        </div>
                        <div class="agent-item">
                            <div class="agent-icon">🧬</div>
                            <div class="agent-name">Phi-1.5</div>
                            <div style="font-size: 10px; color: #9BA1A6;">Raciocínio</div>
                        </div>
                    </div>

                    <p style="margin-top: 12px; font-size: 12px;">Como posso ajudar?</p>
                </div>
            </div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-box">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Digite sua mensagem..." 
                autocomplete="off"
            >
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // Simular respostas da IA
        const responses = [
            'Olá! Como posso ajudá-lo?',
            'Essa é uma ótima pergunta! 🤔',
            'Deixa eu pensar sobre isso...',
            'Entendi! Vou analisar para você.',
            'Que interessante! 💡',
            'Claro, estou aqui para ajudar!',
            'Ótimo! Vou processar sua solicitação.',
            'Perfeito! Deixa comigo.'
        ];

        function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message) return;

            // Adicionar mensagem do usuário
            addMessage(message, 'user');
            messageInput.value = '';

            // Simular resposta da IA
            setTimeout(() => {
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                addMessage(randomResponse, 'bot');
            }, 500);
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            messageDiv.appendChild(bubble);
            chatContainer.appendChild(messageDiv);
            
            // Scroll para o final
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Enviar ao pressionar Enter
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Focus no input ao carregar
        window.addEventListener('load', () => {
            messageInput.focus();
        });
    </script>
</body>
</html>
