<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiamanteBlack 💎 - Real AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
    
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body { 
      font-family: 'Inter', sans-serif; 
      background: radial-gradient(circle at center, #1a0033, #000000); 
      color: white; 
      height: 100vh; 
      overflow: hidden; 
    }
    
    /* Barra de Progresso */
    .loading-bar { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 4px; 
      background: rgba(0, 240, 255, 0.1); 
      z-index: 9999; 
      display: none; 
    }
    
    .loading-bar.active { 
      display: block; 
    }
    
    .loading-bar-fill { 
      height: 100%; 
      background: linear-gradient(90deg, #00f0ff, #ff00ff); 
      width: 0%; 
      transition: width 0.3s ease; 
      box-shadow: 0 0 10px #00f0ff; 
    }
    
    .loading-status { 
      position: fixed; 
      top: 10px; 
      left: 50%; 
      transform: translateX(-50%); 
      background: rgba(10, 0, 30, 0.95); 
      padding: 8px 20px; 
      border-radius: 20px; 
      border: 1px solid #00f0ff; 
      font-size: 12px; 
      z-index: 10000; 
      display: none; 
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.5); 
    }
    
    .loading-status.active { 
      display: block; 
    }
    
    .screen { 
      height: 100vh; 
      display: none; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
    }
    
    .card { 
      background: rgba(20, 0, 40, 0.97); 
      padding: 45px 35px; 
      border-radius: 25px; 
      border: 2px solid #00f0ff; 
      box-shadow: 0 0 80px rgba(0, 240, 255, 0.6); 
      max-width: 420px; 
      width: 90%; 
      text-align: center; 
    }
    
    h1 { 
      font-family: 'Space Grotesk', sans-serif; 
      font-size: 42px; 
      background: linear-gradient(90deg, #00f0ff, #ff00ff); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      background-clip: text; 
    }
    
    input, textarea { 
      width: 100%; 
      padding: 15px; 
      margin: 12px 0; 
      background: #1a0033; 
      border: 1px solid #00f0ff; 
      border-radius: 12px; 
      color: white; 
      resize: none; 
      font-family: 'Inter', sans-serif; 
    }
    
    input::placeholder, textarea::placeholder { 
      color: #888; 
    }
    
    button { 
      padding: 16px; 
      margin: 8px 0; 
      width: 100%; 
      background: #00f0ff; 
      color: black; 
      border: none; 
      border-radius: 12px; 
      font-weight: bold; 
      cursor: pointer; 
      transition: all 0.3s; 
    }
    
    button:hover { 
      background: #00d4dd; 
      transform: translateY(-2px); 
    }
    
    button:active { 
      transform: translateY(0); 
    }
    
    .chat-screen { 
      display: none; 
      flex-direction: column; 
      height: 100vh; 
    }
    
    .header { 
      background: rgba(10, 0, 30, 0.98); 
      padding: 15px 20px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 1px solid #00f0ff; 
    }
    
    .header-left { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
    }
    
    .settings-btn { 
      background: transparent; 
      border: 1px solid #00f0ff; 
      color: #00f0ff; 
      padding: 8px 12px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 18px; 
      width: auto; 
      margin: 0; 
      transition: all 0.3s; 
    }
    
    .settings-btn:hover { 
      background: rgba(0, 240, 255, 0.1); 
    }
    
    .status { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      font-size: 14px; 
    }
    
    .status-dot { 
      width: 10px; 
      height: 10px; 
      background: #00ff00; 
      border-radius: 50%; 
      box-shadow: 0 0 8px #00ff00; 
      animation: pulse 2s infinite; 
    }
    
    .status-dot.loading { 
      background: #ffaa00; 
      box-shadow: 0 0 8px #ffaa00; 
    }
    
    @keyframes pulse { 
      0%, 100% { opacity: 1; } 
      50% { opacity: 0.5; } 
    }
    
    .chat-area { 
      flex: 1; 
      overflow-y: auto; 
      padding: 20px; 
      display: flex; 
      flex-direction: column; 
      gap: 14px; 
      background: #0a001f; 
    }
    
    .mensagem { 
      padding: 14px 18px; 
      border-radius: 20px; 
      max-width: 85%; 
      line-height: 1.5; 
      display: flex; 
      gap: 12px; 
      animation: slideIn 0.3s ease; 
      position: relative; 
    }
    
    @keyframes slideIn { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    
    .bot { 
      background: linear-gradient(135deg, #2a0040, #1a0028); 
      border: 1px solid #00f0ff; 
      align-self: flex-start; 
      border-bottom-left-radius: 6px; 
    }
    
    .user { 
      background: linear-gradient(135deg, #00f0ff, #0099cc); 
      color: black; 
      align-self: flex-end; 
      border-bottom-right-radius: 6px; 
      font-weight: 500; 
    }
    
    .avatar { 
      width: 38px; 
      height: 38px; 
      border-radius: 50%; 
      flex-shrink: 0; 
      border: 2px solid #00f0ff; 
      background: #1a0033; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 20px; 
    }
    
    .message-actions { 
      position: absolute; 
      bottom: 5px; 
      right: 10px; 
      display: flex; 
      gap: 5px; 
      opacity: 0.7; 
    }
    
    .action-btn { 
      background: rgba(0, 240, 255, 0.2); 
      border: 1px solid #00f0ff; 
      color: #00f0ff; 
      padding: 4px 8px; 
      border-radius: 6px; 
      font-size: 11px; 
      cursor: pointer; 
      width: auto; 
      margin: 0; 
    }
    
    .action-btn:hover { 
      background: rgba(0, 240, 255, 0.4); 
    }
    
    .input-area { 
      padding: 12px 15px; 
      background: rgba(10, 0, 30, 0.98); 
      display: flex; 
      align-items: flex-end; 
      gap: 8px; 
      border-top: 1px solid #00f0ff; 
    }
    
    .input-area button { 
      padding: 12px; 
      width: auto; 
      min-width: 44px; 
      margin: 0; 
      font-size: 18px; 
    }
    
    textarea { 
      flex: 1; 
      max-height: 150px; 
      min-height: 50px; 
      overflow-y: auto; 
    }
    
    .agent-badge { 
      display: inline-block; 
      padding: 2px 8px; 
      background: rgba(0, 240, 255, 0.2); 
      border-radius: 6px; 
      font-size: 11px; 
      color: #00f0ff; 
      margin-right: 4px; 
    }
    
    .ai-status { 
      font-size: 11px; 
      color: #888; 
      margin-top: 10px; 
      text-align: center; 
    }
    
    /* Modal */
    .modal { 
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0, 0, 0, 0.8); 
      z-index: 1000; 
      align-items: center; 
      justify-content: center; 
    }
    
    .modal.active { 
      display: flex; 
    }
    
    .modal-content { 
      background: rgba(20, 0, 40, 0.97); 
      padding: 30px; 
      border-radius: 20px; 
      border: 2px solid #00f0ff; 
      max-width: 90%; 
      width: 400px; 
      box-shadow: 0 0 50px rgba(0, 240, 255, 0.5); 
    }
    
    .modal-content h2 { 
      margin-bottom: 20px; 
      color: #00f0ff; 
    }
    
    .modal-content button { 
      margin: 8px 0; 
    }
    
    .thinking { 
      font-style: italic; 
      color: #888; 
      font-size: 13px; 
    }
  </style>
</head>
<body>

  <div class="loading-bar" id="loadingBar">
    <div class="loading-bar-fill" id="loadingBarFill"></div>
  </div>
  
  <div class="loading-status" id="loadingStatus">Inicializando IA...</div>

  <div class="screen" id="registerScreen">
    <div class="card">
      <h1>DiamanteBlack 💎</h1>
      <p style="color:#00f0ff; margin:20px 0;">Criar Nova Conta</p>
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regSenha" placeholder="Senha">
      <button onclick="registrarUsuario()">REGISTRAR</button>
      <button onclick="mostrarLogin()" style="background:#333;">Já tenho conta</button>
      <p class="ai-status">🤖 IA Real com Transformers.js</p>
    </div>
  </div>

  <div class="screen" id="loginScreen">
    <div class="card">
      <h1>DiamanteBlack 💎</h1>
      <p style="color:#00f0ff; margin:20px 0;">Entrar</p>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginSenha" placeholder="Senha">
      <button onclick="fazerLogin()">ENTRAR</button>
      <button onclick="mostrarRegistro()" style="background:#333;">Criar conta</button>
      <p class="ai-status">💎 3 Modelos de IA integrados</p>
    </div>
  </div>

  <div class="chat-screen" id="chatScreen">
    <div class="header">
      <div class="header-left">
        <h2 style="font-size: 20px;">DiamanteBlack 💎</h2>
        <button class="settings-btn" onclick="abrirConfigurações()">⚙️</button>
      </div>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Inicializando</span>
      </div>
    </div>
    
    <div class="chat-area" id="chatArea"></div>
    
    <div class="input-area">
      <button onclick="document.getElementById('fileInput').click()" title="Enviar arquivos">📎</button>
      <button onclick="iniciarVoz()" title="Falar">🎤</button>
      <textarea id="mensagem" placeholder="Pergunte algo..." rows="1" onkeypress="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); enviarMensagem();}"></textarea>
      <button onclick="enviarMensagem()">➤</button>
    </div>
    <input type="file" id="fileInput" multiple accept=".js,.py,.txt,.html,.css,.json,.ino,.md,.cpp,.c,.java" style="display:none;" onchange="processarArquivos()">
  </div>

  <div class="modal" id="modalConfig">
    <div class="modal-content">
      <h2>⚙️ Configurações</h2>
      <button onclick="limparConversa()">🗑️ Limpar Conversa</button>
      <button onclick="exportarMemoria()">💾 Exportar Memória</button>
      <button onclick="document.getElementById('importInput').click()">📥 Importar Memória</button>
      <button onclick="fecharModal()" style="background:#333;">❌ Fechar</button>
      <input type="file" id="importInput" accept=".json" style="display:none;" onchange="importarMemoria(event)">
    </div>
  </div>

  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
    
    // Configuração do ambiente
    env.allowLocalModels = false;
    env.useBrowserCache = true;
    
    let currentUser = null;
    let db = null;
    let aiModels = {
      logica: null,  // Qwen para lógica geral
      codigo: null,  // TinyLlama para código
      sintese: null  // DistilGPT2 para síntese
    };
    let modelsReady = false;

    // ============== CARREGAMENTO DE MODELOS ==============
    async function carregarModelos() {
      const statusText = document.getElementById('statusText');
      const statusDot = document.getElementById('statusDot');
      const loadingBar = document.getElementById('loadingBar');
      const loadingBarFill = document.getElementById('loadingBarFill');
      const loadingStatus = document.getElementById('loadingStatus');

      try {
        loadingBar.classList.add('active');
        loadingStatus.classList.add('active');
        statusDot.classList.add('loading');

        // Modelo 1: Lógica Geral (Qwen - mais leve)
        try {
          statusText.textContent = 'Baixando IA de Lógica...';
          loadingStatus.textContent = '🧠 Baixando Motor de IA (1/3)...';
          loadingBarFill.style.width = '10%';
          console.log('Carregando Qwen...');
          
          aiModels.logica = await pipeline('text-generation', 'Xenova/Qwen1.5-0.5B-Chat', {
            progress_callback: (progress) => {
              if (progress.progress) {
                const percent = Math.min(10 + (progress.progress * 30), 40);
                loadingBarFill.style.width = percent + '%';
              }
            }
          });
          console.log('✅ Qwen carregado');
          loadingBarFill.style.width = '40%';
        } catch (e) {
          console.warn('⚠️ Falha ao carregar Qwen:', e);
          loadingStatus.textContent = '⚠️ Tentando modelo alternativo...';
        }

        // Modelo 2: Código (TinyLlama)
        try {
          statusText.textContent = 'Baixando IA de Código...';
          loadingStatus.textContent = '💻 Baixando Motor de IA (2/3)...';
          console.log('Carregando TinyLlama...');
          
          aiModels.codigo = await pipeline('text-generation', 'Xenova/TinyLlama-1.1B-Chat-v1.0', {
            progress_callback: (progress) => {
              if (progress.progress) {
                const percent = Math.min(40 + (progress.progress * 30), 70);
                loadingBarFill.style.width = percent + '%';
              }
            }
          });
          console.log('✅ TinyLlama carregado');
          loadingBarFill.style.width = '70%';
        } catch (e) {
          console.warn('⚠️ Falha ao carregar TinyLlama:', e);
        }

        // Modelo 3: Síntese (DistilGPT2 - mais leve e rápido)
        try {
          statusText.textContent = 'Baixando IA de Síntese...';
          loadingStatus.textContent = '✨ Baixando Motor de IA (3/3)...';
          console.log('Carregando DistilGPT2...');
          
          aiModels.sintese = await pipeline('text-generation', 'Xenova/distilgpt2', {
            progress_callback: (progress) => {
              if (progress.progress) {
                const percent = Math.min(70 + (progress.progress * 30), 100);
                loadingBarFill.style.width = percent + '%';
              }
            }
          });
          console.log('✅ DistilGPT2 carregado');
          loadingBarFill.style.width = '100%';
        } catch (e) {
          console.warn('⚠️ Falha ao carregar DistilGPT2:', e);
        }

        // Verifica se pelo menos um modelo carregou
        if (!aiModels.logica && !aiModels.codigo && !aiModels.sintese) {
          throw new Error('Nenhum modelo foi carregado com sucesso');
        }

        modelsReady = true;
        statusText.textContent = 'IA Pronta';
        statusDot.classList.remove('loading');
        loadingStatus.textContent = '✅ IA carregada com sucesso!';
        
        setTimeout(() => {
          loadingBar.classList.remove('active');
          loadingStatus.classList.remove('active');
        }, 2000);
        
        console.log('✅ Sistema de IA inicializado com sucesso!');
        console.log('Modelos disponíveis:', {
          logica: !!aiModels.logica,
          codigo: !!aiModels.codigo,
          sintese: !!aiModels.sintese
        });

      } catch (error) {
        console.error('❌ Erro ao carregar modelos:', error);
        statusText.textContent = 'Erro na IA';
        loadingStatus.textContent = '❌ Erro ao carregar IA';
        statusDot.style.background = '#ff0000';
        
        setTimeout(() => {
          loadingBar.classList.remove('active');
          loadingStatus.classList.remove('active');
        }, 3000);
      }
    }

    // ============== MOTOR DE IA COM RAG ==============
    async function consultarIA(pergunta, contextoRAG = []) {
      if (!modelsReady) {
        return { 
          modelo: 'Sistema', 
          resposta: '⚠️ Os modelos de IA ainda estão sendo carregados. Por favor, aguarde alguns instantes.' 
        };
      }

      try {
        // Escolhe o modelo baseado no tipo de pergunta
        let modeloEscolhido = null;
        let tipoModelo = '';

        if (pergunta.toLowerCase().includes('código') || 
            pergunta.toLowerCase().includes('programa') || 
            pergunta.toLowerCase().includes('script') || 
            pergunta.toLowerCase().includes('função')) {
          modeloEscolhido = aiModels.codigo || aiModels.logica || aiModels.sintese;
          tipoModelo = 'Código';
        } else if (contextoRAG.length > 0) {
          // Se tem contexto, usa modelo de síntese
          modeloEscolhido = aiModels.sintese || aiModels.logica;
          tipoModelo = 'Síntese';
        } else {
          // Pergunta geral, usa lógica
          modeloEscolhido = aiModels.logica || aiModels.codigo || aiModels.sintese;
          tipoModelo = 'Lógica';
        }

        if (!modeloEscolhido) {
          throw new Error('Nenhum modelo disponível');
        }

        // Prepara o contexto RAG
        let contextoTexto = '';
        if (contextoRAG.length > 0) {
          contextoTexto = '\n\nContexto dos arquivos:\n';
          contextoRAG.forEach(item => {
            contextoTexto += `${item.nome}: ${item.conteudo.substring(0, 300)}\n`;
          });
        }

        // Monta o prompt
        const prompt = `Pergunta: ${pergunta}${contextoTexto}\n\nResposta:`;
        console.log(`🤖 Usando modelo: ${tipoModelo}`);
        
        // Gera a resposta
        const resultado = await modeloEscolhido(prompt, {
          max_new_tokens: 150,
          temperature: 0.7,
          top_p: 0.9,
          do_sample: true
        });

        const respostaIA = resultado[0].generated_text
          .replace(prompt, '')
          .trim();

        return { 
          modelo: tipoModelo, 
          resposta: respostaIA || 'Desculpe, não consegui gerar uma resposta adequada.' 
        };

      } catch (error) {
        console.error('Erro na IA:', error);
        return { 
          modelo: 'Erro', 
          resposta: '❌ Ocorreu um erro ao processar sua pergunta. Tente novamente.' 
        };
      }
    }

    // ============== AUTENTICAÇÃO ==============
    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    window.mostrarLogin = function() {
      document.getElementById('registerScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    }

    window.mostrarRegistro = function() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('registerScreen').style.display = 'flex';
    }

    window.registrarUsuario = function() {
      const email = document.getElementById('regEmail').value.trim();
      const senha = document.getElementById('regSenha').value.trim();
      
      if (!email || !senha) {
        console.error("Preencha todos os campos!");
        return;
      }
      
      const usuarios = JSON.parse(localStorage.getItem('diamanteblack_usuarios') || '[]');
      if (usuarios.find(u => u.email === email)) {
        console.error("Email já cadastrado!");
        return;
      }
      
      sha256(senha).then(hash => {
        usuarios.push({email, hash});
        localStorage.setItem('diamanteblack_usuarios', JSON.stringify(usuarios));
        console.log("✅ Conta criada!");
        mostrarLogin();
      });
    }

    window.fazerLogin = async function() {
      const email = document.getElementById('loginEmail').value.trim();
      const senha = document.getElementById('loginSenha').value.trim();
      
      if (!email || !senha) {
        console.error("Preencha todos os campos!");
        return;
      }
      
      const usuarios = JSON.parse(localStorage.getItem('diamanteblack_usuarios') || '[]');
      const usuario = usuarios.find(u => u.email === email);
      
      if (!usuario || await sha256(senha) !== usuario.hash) {
        console.error("Email ou senha incorretos!");
        return;
      }
      
      currentUser = email;
      await initDB();
      
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('chatScreen').style.display = 'flex';
      
      // Carrega os modelos de IA em background
      carregarModelos();
      
      setTimeout(() => {
        adicionarMensagem("bot", `👋 **Olá, ${email.split('@')[0]}!**\n\n💎 Bem-vindo ao **DiamanteBlack com IA Real**\n\n🤖 **Carregando modelos de IA:**\n- 🧠 Qwen (Lógica)\n- 💻 TinyLlama (Código)\n- ✨ DistilGPT2 (Síntese)\n\n⏳ Aguarde o carregamento completo para usar a IA real!`, 'Sistema');
      }, 300);
    }

    // ============== INDEXEDDB ==============
    function initDB() {
      return new Promise(resolve => {
        const request = indexedDB.open(`DiamanteBlack_${currentUser}`, 1);
        
        request.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('conhecimento')) {
            db.createObjectStore('conhecimento', { keyPath: "id", autoIncrement: true });
          }
        };
        
        request.onsuccess = e => {
          db = e.target.result;
          document.getElementById('statusText').textContent = "Carregando IA...";
          resolve();
        };
        
        request.onerror = () => {
          document.getElementById('statusText').textContent = "Erro DB";
          resolve();
        };
      });
    }

    function salvarConhecimento(item) {
      return new Promise((resolve, reject) => {
        if (!db) return reject('DB não inicializado');
        const transaction = db.transaction(['conhecimento'], 'readwrite');
        const store = transaction.objectStore('conhecimento');
        const request = store.add(item);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    async function buscarRelevante(texto) {
      return new Promise((resolve) => {
        if (!db) return resolve([]);
        const transaction = db.transaction(['conhecimento'], 'readonly');
        const store = transaction.objectStore('conhecimento');
        const request = store.getAll();
        
        request.onsuccess = () => {
          const todos = request.result;
          const termo = texto.toLowerCase();
          const filtrados = todos.filter(item => {
            const conteudoLower = item.conteudo.toLowerCase();
            const nomeLower = item.nome.toLowerCase();
            const palavras = termo.split(' ').filter(p => p.length > 3);
            return palavras.some(palavra => 
              conteudoLower.includes(palavra) || nomeLower.includes(palavra)
            );
          });
          resolve(filtrados.slice(0, 3));
        };
        
        request.onerror = () => resolve([]);
      });
    }

    // ============== CHAT ==============
    function adicionarMensagem(remetente, html, modelo = null) {
      const chat = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = `mensagem ${remetente}`;
      
      if (remetente === "bot") {
        const emoji = modelo === 'Código' ? '💻' : modelo === 'Síntese' ? '✨' : '🧠';
        const badge = modelo ? `<span class="agent-badge">${emoji} ${modelo}</span>` : '';
        div.innerHTML = `
          <div class="avatar">💎</div>
          <div style="flex:1;">
            ${badge}${formatarMarkdown(html)}
            <div class="message-actions">
              <button class="action-btn" onclick="copiarMensagem(this)">📋 Copiar</button>
              <button class="action-btn" onclick="ouvirMensagem(this)">🔊 Ouvir</button>
            </div>
          </div>
        `;
      } else {
        div.innerHTML = `<div>${formatarMarkdown(html)}</div>`;
      }
      
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function formatarMarkdown(texto) {
      return texto
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code style="background:#0a0a0a;padding:2px 6px;border-radius:4px;">$1</code>')
        .replace(/\n/g, '<br>');
    }

    window.enviarMensagem = async function() {
      const textarea = document.getElementById('mensagem');
      const texto = textarea.value.trim();
      if (!texto) return;
      
      adicionarMensagem("user", texto);
      textarea.value = "";
      textarea.style.height = '50px';
      
      // Mostra "pensando"
      const thinkingId = Date.now();
      adicionarMensagem("bot", `<span class="thinking" id="thinking-${thinkingId}">💭 Processando com IA...</span>`, 'Sistema');
      
      // Busca contexto RAG
      const contextoRAG = await buscarRelevante(texto);
      
      // Consulta a IA REAL
      const resultado = await consultarIA(texto, contextoRAG);
      
      // Remove "pensando"
      const thinkingElement = document.getElementById(`thinking-${thinkingId}`);
      if (thinkingElement) {
        thinkingElement.closest('.mensagem').remove();
      }
      
      // Adiciona resposta da IA
      let respostaFinal = resultado.resposta;
      if (contextoRAG.length > 0) {
        respostaFinal += `\n\n📚 **Contexto usado:**\n`;
        contextoRAG.forEach((r, i) => {
          respostaFinal += `${i + 1}. ${r.nome}\n`;
        });
      }
      
      adicionarMensagem("bot", respostaFinal, resultado.modelo);
    }

    // ============== PROCESSAMENTO DE ARQUIVOS ==============
    window.processarArquivos = async function() {
      const input = document.getElementById('fileInput');
      const files = input.files;
      if (files.length === 0) return;
      
      adicionarMensagem("bot", `📤 Processando **${files.length} arquivo(s)**...`, 'Sistema');
      let sucessos = 0;
      
      for (const file of files) {
        try {
          const reader = new FileReader();
          await new Promise((resolve, reject) => {
            reader.onload = async (e) => {
              try {
                const conteudo = e.target.result;
                await salvarConhecimento({
                  nome: file.name,
                  tipo: file.type || file.name.split('.').pop(),
                  conteudo: conteudo,
                  tamanho: file.size,
                  data: new Date().toISOString()
                });
                sucessos++;
                resolve();
              } catch (err) {
                reject(err);
              }
            };
            reader.onerror = reject;
            reader.readAsText(file);
          });
        } catch (err) {
          console.error('Erro:', err);
        }
      }
      
      setTimeout(() => {
        adicionarMensagem("bot", `✅ **${sucessos}/${files.length}** arquivo(s) salvos!\n\n🧠 Memória RAG atualizada. A IA pode usar esses arquivos como contexto.`, 'Sistema');
        input.value = "";
      }, 500);
    }

    // ============== VOZ ==============
    window.iniciarVoz = function() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        return alert("❌ Reconhecimento de voz não suportado.");
      }
      
      const recognition = new SpeechRecognition();
      recognition.lang = 'pt-BR';
      
      recognition.onstart = () => {
        document.getElementById('statusText').textContent = "🎤 Ouvindo...";
      };
      
      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById('mensagem').value = transcript;
      };
      
      recognition.onend = () => {
        document.getElementById('statusText').textContent = modelsReady ? "IA Pronta" : "Carregando IA...";
      };
      
      recognition.start();
    }

    window.copiarMensagem = function(btn) {
      const mensagem = btn.closest('.mensagem');
      const texto = mensagem.innerText;
      navigator.clipboard.writeText(texto).then(() => {
        btn.textContent = '✅ Copiado';
        setTimeout(() => btn.textContent = '📋 Copiar', 2000);
      });
    }

    window.ouvirMensagem = function(btn) {
      const mensagem = btn.closest('.mensagem');
      const texto = mensagem.innerText;
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'pt-BR';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
        btn.textContent = '⏸️ Falando';
        utterance.onend = () => {
          btn.textContent = '🔊 Ouvir';
        };
      } else {
        alert('Síntese de voz não suportada');
      }
    }

    // ============== CONFIGURAÇÕES ==============
    window.abrirConfigurações = function() {
      document.getElementById('modalConfig').classList.add('active');
    }

    window.fecharModal = function() {
      document.getElementById('modalConfig').classList.remove('active');
    }

    window.limparConversa = function() {
      if (confirm('Deseja limpar toda a conversa?')) {
        document.getElementById('chatArea').innerHTML = '';
        fecharModal();
      }
    }

    window.exportarMemoria = async function() {
      return new Promise((resolve) => {
        const transaction = db.transaction(['conhecimento'], 'readonly');
        const store = transaction.objectStore('conhecimento');
        const request = store.getAll();
        
        request.onsuccess = () => {
          const dados = request.result;
          const json = JSON.stringify(dados, null, 2);
          const blob = new Blob([json], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `diamanteblack_memoria_${Date.now()}.json`;
          a.click();
          URL.revokeObjectURL(url);
          fecharModal();
          alert('✅ Memória exportada!');
          resolve();
        };
      });
    }

    window.importarMemoria = async function(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const dados = JSON.parse(e.target.result);
          for (const item of dados) {
            delete item.id;
            await salvarConhecimento(item);
          }
          alert('✅ Memória importada com sucesso!');
          fecharModal();
        } catch (err) {
          alert('❌ Erro ao importar: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    // Auto-resize textarea
    document.addEventListener('DOMContentLoaded', () => {
      const textarea = document.getElementById('mensagem');
      if (textarea) {
        textarea.addEventListener('input', function() {
          this.style.height = '50px';
          this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
      }
    });

    // Inicialização
    window.onload = () => {
      document.getElementById('loginScreen').style.display = 'flex';
      console.log('💎 DiamanteBlack com IA Real inicializado');
    };
  </script>
</body>
</html>
